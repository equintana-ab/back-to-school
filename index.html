<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet" />
    <title>Back to School hero-section__bs</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", Arial, sans-serif;
      }

      body {
        background: #68deff;
        min-height: 100vh;
      }

      #hero-section__bs {
        width: 100%;
        background: #68deff;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0px 20px;
      }

      .left img {
        width: clamp(300px, 80vw, 500px);
        height: auto;
        display: block;
        max-width: 500px;
      }

      /* RIGHT / CONTENT */
      .right {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-top: -20px;
      }

      /* ICONS GRID */
      .icons {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }

      .icon-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-decoration: none;
      }

      .icon {
        width: clamp(80px, 9vw, 130px);
        display: block;
        flex: 1;
      }

      /* COUNTDOWN */
      .countdown {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        position: relative;
      }

      .countdown-label {
        font-weight: normal;
        color: #3652fc;
        font-size: clamp(16px, 3vw, 20px);
        font-weight: 700;
        line-height: 27px;
        -webkit-text-stroke: 4.3px #fff;
        paint-order: stroke fill;
      }

      .timer {
        display: flex;
        align-items: center;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: linear-gradient(117deg, rgba(226, 239, 255, 0.36) 0.74%, rgba(226, 239, 255, 0.12) 111.76%);
        backdrop-filter: blur(4px);
        padding: 13px 16px;
        gap: 12px;
        position: relative;
        justify-content: center;
      }
      .countdown svg {
        display: none;
      }

      .unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }

      .unit .time-label {
        font-size: clamp(8px, 3vw, 14px);
        color: #185baa;
        font-weight: 400;
      }

      .box {
        background: #fff;
        padding: 5px 0px;
        border-radius: 10px;
        text-align: center;
        width: clamp(44px, 13vw, 50px);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
        color: #185baa;
        font-size: clamp(15px, 3vw, 18px);
        font-weight: 700;
      }

      .sep {
        width: 1px;
        height: 35px;
        background: rgba(255, 255, 255, 0.6);
        align-self: center;
        margin-bottom: 18px;
      }

      /* Tablet */
      @media (width > 767px) {
        #hero-section__bs {
          flex-direction: row;
          justify-content: space-between;
          align-items: flex-start;
          gap: 40px;
          max-width: 1200px;
          margin: 0 auto;
          padding: 40px;
        }

        .right {
          padding: 0;
          justify-content: center;
          margin-top: unset;
        }

        .icon-box {
          font-size: 12px;
        }

        .countdown {
          align-items: center;
          flex-direction: column;
        }

        .countdown-label {
          width: 100%;
          text-align: center;
        }
        .timer {
          padding: 20px 16px;
          z-index: 999;
        }
      }
      /* Desktop */
      @media (width > 1023px) {
        .countdown {
          flex-direction: row;
        }
        .countdown svg {
          display: block;
          position: absolute;
          bottom: -64px;
          right: -20px;
          z-index: 0;
          width: 120px;
        }
      }
    </style>
  </head>

  <body>
    <section id="hero-section__bs">
      <div class="left">
        <img src="left-column.png" alt="Back to School" />
      </div>

      <div class="right">
        <div class="icons">
          <a class="icon-box" href="/deals"> <img src="add-on-p99-deals.png" alt="Deals-icon" class="icon" /> </a>
          <a class="icon-box" href="/bundles"> <img src="super-bundles.png" alt="Bundles-icon" class="icon" /> </a>
          <a class="icon-box" href="/payment"> <img src="buy-now-pay-later.png" alt="Payment-icon" class="icon" /> </a>
          <a class="icon-box" href="/delivery">
            <img src="free-delivery.png" alt="Delivery-icon" class="icon" />
          </a>
          <a class="icon-box" href="/installation">
            <img src="free-installation.png" alt="Installation-icon" class="icon" />
          </a>
          <a class="icon-box" href="/vouchers">
            <img src="vouchers.png" alt="Vouchers-icon" class="icon" />
          </a>
        </div>

        <div class="countdown">
          <span class="countdown-label">Don't miss it out in:</span>
          <div class="timer">
            <div class="unit">
              <h2 id="days" class="box">04</h2>
              <span class="time-label">days</span>
            </div>
            <div class="sep"></div>
            <div class="unit">
              <h2 id="hours" class="box">04</h2>
              <span class="time-label">hours</span>
            </div>
            <div class="sep"></div>
            <div class="unit">
              <h2 id="mins" class="box">04</h2>
              <span class="time-label">mins</span>
            </div>
            <div class="sep"></div>
            <div class="unit">
              <h2 id="secs" class="box">04</h2>
              <span class="time-label">secs</span>
            </div>
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="144" height="108" viewBox="0 0 144 108" fill="none">
            <path
              d="M139.948 103.74C143.644 17.1051 49.3599 24.112 47.2985 67.2054C45.7326 99.9414 115.568 78.9663 99.1501 46.1841C69.3694 -13.2791 3.85487 7.2953 3.85487 7.2953"
              stroke="#FF00F8"
              stroke-width="7.70769"
              stroke-linecap="round" />
          </svg>
        </div>
      </div>
    </section>

    <script>
      const targetDate = new Date();
      targetDate.setDate(targetDate.getDate() + 4);

      function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const secs = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerText = days.toString().padStart(2, "0");
        document.getElementById("hours").innerText = hours.toString().padStart(2, "0");
        document.getElementById("mins").innerText = mins.toString().padStart(2, "0");
        document.getElementById("secs").innerText = secs.toString().padStart(2, "0");
      }

      setInterval(updateTimer, 1000);
      updateTimer();
    </script>
  </body>
</html>
